            transform: translateY(-2px);

<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="recovery-card glass-card">
        <div class="recovery-icon">
            <span class="material-symbols-outlined">verified_user</span>
        </div>
        <h1>Set New Password</h1>
        <p id="instructionText">We've sent a 6-digit code to your email. Enter it below along with your new password.</p>

        <div id="errorMsg" class="error-message"></div>
        <div id="successMsg" class="success-message"></div>

        <form id="resetForm">
            <div class="form-group">
                <label for="otp">Recovery Code (OTP)</label>
                <input type="text" id="otp" placeholder="000000" maxlength="6" class="otp-input" required>
            </div>
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" placeholder="Min 6 characters" required minlength="6">
            </div>
            <button type="submit" id="submitBtn" class="btn-recover">Update Password</button>
        </form>

        <div class="resend-box">
            Didn't receive the code? <a href="forgot-password.html" class="resend-link">Try again</a>
        </div>
    </div>

    <script>
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:10000/api'
            : 'https://knowyourcity.onrender.com/api';

        const form = document.getElementById('resetForm');
        const otpInput = document.getElementById('otp');
        const passwordInput = document.getElementById('newPassword');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const instructionText = document.getElementById('instructionText');

        const email = localStorage.getItem('kyc_recovery_email');
        if (!email) {
            window.location.href = 'forgot-password.html';
        } else {
            instructionText.innerHTML = `We've sent a 6-digit code to <strong>${email}</strong>. Enter it below along with your new password.`;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const otp = otpInput.value.trim();
            const newPassword = passwordInput.value.trim();

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Updating...';

            try {
                const res = await fetch(`${API_BASE}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp, newPassword })
                });
                const data = await res.json();

                if (res.ok) {
                    successMsg.textContent = 'Password updated successfully! Redirecting to login...';
                    successMsg.style.display = 'block';
                    localStorage.removeItem('kyc_recovery_email');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2500);
                } else {
                    errorMsg.textContent = data.message || 'Verification failed. Please check the code.';
                    errorMsg.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Update Password';
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Please try again.';
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Update Password';
            }
        });
    </script>
</body>
