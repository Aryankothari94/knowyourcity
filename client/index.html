<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>client</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // 📊 Analytics: Track Page Hit
      (async function trackHit() {
        try {
          const API_BASE_ANALYTICS = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:10000/api' 
            : 'https://knowyourcity.onrender.com/api';
          
          await fetch(`${API_BASE_ANALYTICS}/admin/hit`, { method: 'POST' });
        } catch (e) {}
      })();
    </script>

    <!-- Global Access Dropdowns (Shared by Desktop & Mobile) -->
    <div class="location-dropdown" id="locationDropdown" onclick="event.stopPropagation()">
      <div class="location-dropdown-header">
        <button class="dropdown-back-btn" onclick="this.closest('.location-dropdown').classList.remove('active')" aria-label="Back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5"></path>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
        </button>
        <span>📍 Change Location</span>
      </div>
      <div class="location-search-wrapper">
        <input type="text" id="locationSearchInput" placeholder="Search city or place..." autocomplete="off" oninput="window.fetchLocationSuggestions(this.value)" />
        <button class="location-search-btn" onclick="window.searchLocation()">🔍</button>
      </div>
      <button class="location-current-btn" onclick="window.useCurrentLocation()">📍 Use Current Location</button>
      <div class="location-results" id="locationResults"></div>
      <div class="location-current" id="locationCurrentInfo">
        <span class="location-current-label">Current:</span>
        <span class="location-current-city" id="currentCityDisplay">--</span>
      </div>
    </div>

    <div class="location-dropdown" id="weatherDropdown" onclick="event.stopPropagation()" style="width: 320px;">
      <div class="location-dropdown-header">
        <button class="dropdown-back-btn" onclick="this.closest('.location-dropdown').classList.remove('active')" aria-label="Back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5"></path>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
        </button>
        <span>🌦️ Hourly Forecast</span>
      </div>
      <div id="hourlyWeatherList" style="padding: 10px; display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto;">
        <div class="spinner-small" style="margin: 20px auto;"></div>
      </div>
    </div>
  </body>
</html>
