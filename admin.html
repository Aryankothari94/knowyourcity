<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYC Admin Dashboard | User Management</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap">
    <style>
        :root {
            --admin-bg: #05060f;
            --admin-accent: #00d4ff;
        }

        body {
            background: var(--admin-bg);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .admin-sidebar {
            width: 260px;
            height: 100vh;
            background: rgba(255,255,255,0.02);
            border-right: 1px solid rgba(255,255,255,0.1);
            position: fixed;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }

        .admin-main {
            margin-left: 280px;
            padding: 40px;
        }

        .admin-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--admin-accent);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-nav-item {
            padding: 12px 15px;
            border-radius: 8px;
            color: #ccc;
            text-decoration: none;
            margin-bottom: 10px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-nav-item.active, .admin-nav-item:hover {
            background: rgba(0, 212, 255, 0.1);
            color: var(--admin-accent);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 24px;
            border-radius: 16px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #888;
            font-size: 0.9rem;
        }

        .table-container {
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 18px 20px;
            background: rgba(255,255,255,0.03);
            color: #888;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.95rem;
        }

        tr:last-child td { border-bottom: none; }

        .user-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #00d4ff, #0055ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .btn-logout {
            margin-top: auto;
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff4444;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-logout:hover {
            background: rgba(255, 68, 68, 0.1);
        }

        #loadingOverlay {
            position: fixed;
            inset: 0;
            background: var(--admin-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 212, 255, 0.1);
            border-top-color: var(--admin-accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loadingOverlay">
        <div class="loader"></div>
    </div>

    <div class="admin-sidebar">
        <div class="admin-brand">
            <span>🛡️</span> Admin Panel
        </div>
        <nav>
            <a href="#" class="admin-nav-item active">
                <span>👥</span> All Users
            </a>
            <a href="index.html" class="admin-nav-item">
                <span>🏠</span> View Website
            </a>
        </nav>
        <div class="btn-logout" id="adminLogout">Logout Administrator</div>
    </div>

    <main class="admin-main">
        <h1>User Management</h1>
        <p style="color: #888; margin-bottom: 30px;">Overview of all registered citizens on Know Your City.</p>

        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalUsersCount">0</div>
                <div class="stat-label">Total Registered Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">Active</div>
                <div class="stat-label">System Status</div>
            </div>
        </div>

        <div class="table-container">
            <table id="usersTable">
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Email Address</th>
                        <th>Phone</th>
                        <th>Date of Birth</th>
                        <th>Joined</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <!-- Dynamic Rows -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const API_BASE = 'https://knowyourcity.onrender.com/api';

        document.addEventListener('DOMContentLoaded', () => {
            const isAdmin = localStorage.getItem('kyc_isAdmin') === 'true';
            const adminToken = localStorage.getItem('kyc_adminToken');

            if (!isAdmin || !adminToken) {
                window.location.href = 'index.html';
                return;
            }

            fetchUsers();

            document.getElementById('adminLogout').addEventListener('click', () => {
                localStorage.removeItem('kyc_isAdmin');
                localStorage.removeItem('kyc_adminToken');
                window.location.href = 'index.html';
            });
        });

        async function fetchUsers() {
            const adminToken = localStorage.getItem('kyc_adminToken');
            try {
                const res = await fetch(`${API_BASE}/admin/users`, {
                    headers: { 'X-Admin-Token': adminToken }
                });
                const data = await res.json();

                if (res.ok) {
                    renderUsers(data.users);
                    document.getElementById('totalUsersCount').textContent = data.count;
                } else {
                    alert('Session expired or unauthorized.');
                    window.location.href = 'index.html';
                }
            } catch (err) {
                console.error('Error fetching users:', err);
                alert('Could not connect to the administration server.');
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        function renderUsers(users) {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>
                        <div style="display:flex; align-items:center; gap:12px;">
                            <div class="user-avatar">${user.firstName[0]}${user.lastName[0]}</div>
                            <div>
                                <div style="font-weight:600;">${user.firstName} ${user.lastName}</div>
                            </div>
                        </div>
                    </td>
                    <td>${user.email}</td>
                    <td style="color:#aaa;">${user.phone}</td>
                    <td style="color:#aaa;">${new Date(user.dob).toLocaleDateString()}</td>
                    <td style="color:#888; font-size:0.85rem;">${new Date(user.createdAt).toLocaleDateString()}</td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
