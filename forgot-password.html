    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;

        }

        .recovery-card {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            text-align: center;
        }

        .recovery-icon {
            width: 70px;
            height: 70px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 20px;

            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 12px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .recovery-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .form-group {
            text-align: left;
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: var(--accent-cyan);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 4px rgba(0, 212, 255, 0.1);
        }

        .btn-recover {
            width: 100%;
            padding: 16px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 12px;
            color: #05060f;
            font-family: var(--font-heading);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 24px;
        }

        .btn-recover:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.3);
        }

        .btn-recover:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: 0.3s;
        }

            color: var(--accent-cyan);

            border: 1px solid rgba(0, 230, 118, 0.2);

<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="recovery-card glass-card">
        <div class="recovery-icon">
            <span class="material-symbols-outlined">lock_reset</span>
        </div>
        <h1>Forgot Password?</h1>
        <p>No worries, it happens! Enter your registered email address and we'll send you a recovery code to reset your password.</p>

        <div id="errorMsg" class="error-message"></div>
        <div id="successMsg" class="success-message"></div>

        <form id="forgotForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>
            <button type="submit" id="submitBtn" class="btn-recover">Send Recovery Code</button>
        </form>

        <a href="index.html" class="back-link">
            <span class="material-symbols-outlined" style="font-size: 18px;">arrow_back</span>
            Back to Login
        </a>
    </div>

    <script>
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:10000/api'
            : 'https://knowyourcity.onrender.com/api';

        const form = document.getElementById('forgotForm');
        const emailInput = document.getElementById('email');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            try {
                const res = await fetch(`${API_BASE}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (res.ok) {
                    successMsg.textContent = 'Verification code sent! Redirecting...';
                    successMsg.style.display = 'block';
                    localStorage.setItem('kyc_recovery_email', email);
                    setTimeout(() => {
                        window.location.href = `reset-password.html`;
                    }, 2000);
                } else {
                    errorMsg.textContent = data.message || 'Something went wrong. Please try again.';
                    errorMsg.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Send Recovery Code';
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Please check your connection.';
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Recovery Code';
            }
        });
    </script>
</body>
